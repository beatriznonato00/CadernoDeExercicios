<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var A= 7
        var B= 7
        var soma= (A + B);
        var aoQuadrado= (A + B ) * (A + B)
        document.write(" O valor de A é de: " + A + "<br/>")
        document.write(" O valor de B é de: " + B + "<br/>")
        document.write(" O valor de A+B é de: " + soma.toFixed(0) + "<br/>");
        document.write(" O valor ao quadrado da soma é de: " + aoQuadrado.toFixed(0))
    </script>
</body>
</html>
