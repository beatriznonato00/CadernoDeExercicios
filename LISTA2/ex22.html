<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var valor1 = parseFloat (prompt(" Digite o valor da variavel 1 é:"))
        var valor2= parseFloat(prompt("Digite o valor da variavel 2 é: "))
        var media = (valor1 + valor2)/2;

        document.write("O valor da variavel 1 é de: " + valor1);
        document.write("<br/>O valor da variavel 2 é de: " + valor2);
        document.write("<br/> A media é de :" + media);

    </script>
</body>
</html>
