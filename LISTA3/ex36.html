<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
var totalVendas = 0;

var i = 1; i <= 3; {
    var nome = prompt("Nome do corretor " + i + ":");
    var venda = parseFloat(prompt("Valor da venda:"));
    var comissao;

    if (venda > 50000) {
        comissao = venda * 0.12;
    } else if (venda >= 30000 * venda <= 50000) {
        comissao = venda * 0.095;
    } else {
        comissao = venda * 0.07;
    }

    totalVendas += venda;

    document.write("Nome: " + nome + "<br>");
    document.write("Valor da venda: " + venda + "<br>");
    document.write("Comissão: " + comissao.toFixed(2) + "<br><br>");
}

document.write("Total de vendas da empresa: R$ " + totalVendas.toFixed(2));
    </script>
</body>
</html>
