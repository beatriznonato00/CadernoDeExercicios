<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
var compra = parseFloat(prompt("Valor da compra:"));
var pago = parseFloat(prompt("Valor pago:"));

var troco = pago - compra;

var notas100 = Math.floor(troco / 100);
var resto = troco % 100;

var notas10 = Math.floor(resto / 10);
resto = resto % 10;

var notas1 = resto;

document.write("Valor da compra: R$ " + compra + "<br>");
document.write("Valor pago: R$ " + pago + "<br>");
document.write("Troco: R$ " + troco + "<br><br>");

document.write("Notas de 100: " + notas100 + "<br>");
document.write("Notas de 10: " + notas10 + "<br>");
document.write("Notas de 1: " + notas1 + "<br>");
</script>
</body>
</html>
