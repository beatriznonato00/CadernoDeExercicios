<script>
var nome = prompt("Nome do cliente:");

var qtdParafusos = Number(prompt("Quantidade de parafusos:"));
var qtdPorcas = Number(prompt("Quantidade de porcas:"));
var qtdArruelas = Number(prompt("Quantidade de arruelas:"));

var precoParafuso = Number(prompt("Preço unitário do parafuso:"));
var precoPorca = Number(prompt("Preço unitário da porca:"));
var precoArruela = Number(prompt("Preço unitário da arruela"));

// totais sem desconto
var totalParafuso = qtdParafusos * precoParafuso;
var totalPorca = qtdPorcas * precoPorca;
var totalArruela = qtdArruelas * precoArruela;

// descontos
var descParafuso = totalParafuso * 0.20;
var descPorca = totalPorca * 0.10;
var descArruela = totalArruela * 0.30;

var totalDesconto = descParafuso + descPorca + descArruela;

var totalBruto = totalParafuso + totalPorca + totalArruela;
var totalPagar = totalBruto - totalDesconto;

document.write("Cliente: " + nome + "<br><br>");

document.write("Parafusos: " + qtdParafusos + "<br>");
document.write("Porcas: " + qtdPorcas + "<br>");
document.write("Arruelas: " + qtdArruelas + "<br><br>");

document.write("Total de desconto: R$ " + totalDesconto + "<br>");
document.write("Total a pagar: R$ " + totalPagar);
</script>
