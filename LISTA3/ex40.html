<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
var nome =("Amanda");

var Parafusos = parseFloat(prompt("Quantidade de parafusos:"));
var Porcas = parseFloat(prompt("Quantidade de porcas:"));
var Arruelas = parseFloat(prompt("Quantidade de arruelas:"));

var precoParafuso = parseFloat(prompt("Preço unitário do parafuso:"));
var precoPorca = parseFloat(prompt("Preço unitário da porca:"));
var precoArruela = parseFloat(prompt("Preço unitário da arruela"));


var totalParafuso = Parafusos * precoParafuso;
var totalPorca = Porcas * precoPorca;
var totalArruela = Arruelas * precoArruela;


var descParafuso = totalParafuso * 0.20;
var descPorca = totalPorca * 0.10;
var descArruela = totalArruela * 0.30;

var totalDesconto = descParafuso + descPorca + descArruela;

var totalBruto = totalParafuso + totalPorca + totalArruela;
var totalPagar = totalBruto - totalDesconto;

document.write("Cliente: " + nome + "<br><br>");

document.write("Parafusos: " + Parafusos + "<br>");
document.write("Porcas: " + Porcas + "<br>");
document.write("Arruelas: " + Arruelas + "<br><br>");

document.write("Total de desconto: R$ " + totalDesconto + "<br>");
document.write("Total a pagar: R$ " + totalPagar);
</script>
</body>
</html>
