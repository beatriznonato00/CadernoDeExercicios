<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        var nota = parseFloat(prompt("digite o valor de A"));

        if (nota>=67){

            document.write ("O valor é de A");

        } else if (nota<67){

            document.write("O valor é de B");
        } 
    </script>
