    <title>Document</title>
</head>
<body>
    <script>
        var a = parseFloat(prompt("Digite o valor de A"));
        // fazer a leitura da variável B
        var b = parseFloat(prompt("Digite o valor de b: "));

           document.write("O valor de A:" + a + "<br>");

            document.write("O valor de B: " + b + "<br>");
        if (a>b){
         document.write("A é maior que B");
        }
        if (b > a){
            document.write("B é maior que A");
        }
        if(a==b){
            document.write("B é igual a A");
        }
    </script>
