<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
var anos = parseFloat(prompt("Digite sua idade em anos:"));
var meses = parseFloat(prompt("Digite os meses:"));
var totalvida = (anos * 365) + (meses * 30);
document.write("Você já viveu aproximadamente " + totalvida);
</script>
