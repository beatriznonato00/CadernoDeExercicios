<script>
let A = Number(prompt("Digite o valor de A:"));
let B = Number(prompt("Digite o valor de B:"));
let C = Number(prompt("Digite o valor de C:"));

let soma = A + B;

if (soma < C) {
    document.write("A soma de A + B é MENOR que C");
} else if (soma > C) {
    document.write("A soma de A + B é MAIOR que C");
} else {
    document.write("A soma de A + B é IGUAL a C");
}
</script>
