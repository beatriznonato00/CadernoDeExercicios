<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var nome = "Beatriz";
        var portugues = parseFloat(prompt("Digite a nota de portugues"));
        var matematica = parseFloat(prompt("Digite a nota de matematica"));
        var ConhecimentoGerais = parseFloat(prompt("Digite a nota de Conhecimentos Gerais:"))

        var total = portugues * matematica * ConhecimentoGerais;

        var media = total / 3;
        document.write("A nota em portugues do aluno é: " + nome + "<br>");
        document.write("A nota de matematica do aluno é: " + matematica + "<br>");
        document.write("A nota  de conhecimento Geral do aluno é: " + ConhecimentoGerais + "<br>");
        if (media > 8) {
            if (portugues >= 10) {
                if (matematica >= 9) {
                    if (ConhecimentoGerais >= 8) {
                        document.write("A situacao do aluno é: Aprovado")
                    } else {
                        document.write("A situacao do aluno é reprovado")
                    }
                     
                    
                }
            }
        }
    </script>
</body>

</html>
