<script>
var nome = prompt("Digite o nome do candidato:");

var portugues = Number(prompt("Nota de Português:"));
var matematica = Number(prompt("Nota de Matemática:"));
var gerais = Number(prompt("Nota de Conhecimentos Gerais:"));

// média
var media = (portugues + matematica + gerais) / 3;

// mostrar dados
document.write("Nome: " + nome + "<br>");
document.write("Português: " + portugues + "<br>");
document.write("Matemática: " + matematica + "<br>");
document.write("Conhecimentos Gerais: " + gerais + "<br>");
document.write("Média: " + media.toFixed(2) + "<br>");

// verificação
if (media > 7 && portugues >= 5 && matematica >= 5 && gerais >= 5) {
    document.write("Situação: Aprovado");
} else {
    document.write("Situação: Reprovado");
}
</script>
