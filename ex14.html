<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var raio=prompt(" Digite o valor de raio:");
        var altura=prompt(" Digite o valor da altura:");
        var total= (3.14159 *( raio * raio) * altura);
        document.write( "O volume desta lata e de: " + total + " <br/>");
        document.write(" O volume é de " + total.toFixed(2));
    </script>
</body>
</html>
