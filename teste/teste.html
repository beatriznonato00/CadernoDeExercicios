<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
   var alturaUsuario= prompt("digite sua altura");
   document.write("<br>altura digitada:  "+alturaUsuario);
   var pesoUsuario= prompt("Digite o peso");
   document.write("<br>peso digitado"+ pesoUsuario);
   var imc= pesoUsuario / (alturaUsuario * alturaUsuario);
   document.write("<br> valor do IMC: " + imc)
    </script>
</body>
</html>
